<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Suggestions - Drop Your Track 🎧</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* ===== BACKGROUND GRID ===== */
    .bg-grid {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      overflow: hidden;
      z-index: -2;
    }

    .bg-grid img {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
      filter: blur(4px) brightness(0.5);
  
    }

    .bg-grid img:nth-child(2) { animation-duration: 25s; }
    .bg-grid img:nth-child(3) { animation-duration: 22s; }
    .bg-grid img:nth-child(4) { animation-duration: 28s; }

    @keyframes floatZoom {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(-20px, -20px); }
    }

    /* ===== DARK OVERLAY ===== */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 20, 0.6);
      z-index: -1;
    }

    /* ===== BODY ===== */
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1c1c2e);
      color: white;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ===== MAIN BOX ===== */
    .container {
      position: relative;
      z-index: 1;

      width: 90%;
      max-width: 600px;
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      font-size: 14px;
      color: #aaa;
    }

    textarea {
      width: 100%;
      height: 100px;
      border-radius: 10px;
      border: none;
      padding: 12px;
      margin-top: 15px;
      resize: none;
      background: #111;
      color: white;
      transition: 0.2s;
    }

    textarea:focus {
      outline: none;
      transform: scale(1.01);
      box-shadow: 0 0 15px rgba(108,92,231,0.3);
      background: #16161f;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #6c5ce7;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #a29bfe;
    }

    /* ===== NAVIGATION ===== */
    nav {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 2;
      display: flex;
      gap: 30px;
    }

    .nav-button {
      background: none;
      border: none;
      padding: 0;
      color: white;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }

    /* ===== SPARK EFFECT ===== */
    .spark {
      position: fixed;
      pointer-events: none;
      font-size: 20px;
      animation: sparkFloat 1s ease-out forwards;
    }

    @keyframes sparkFloat {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0);
      }
    }
  </style>

</head>

<body>

  <!-- BACKGROUND IMAGES -->
  <div class="bg-grid">
    <img src="assets/1.jpeg">
    <img src="assets/2.jpeg">
    <img src="assets/3.jpeg">
    <img src="assets/4.jpeg">
  </div>

  <!-- NAVIGATION -->
  <nav>
    <button class="nav-button">About</button>
    <button class="nav-button">Recent shows</button>
    <button class="nav-button">Contact us</button>
  </nav>

  <!-- MAIN UI -->
  <div class="container">
    <h1>🎶 Share Your Music Vibe</h1>
    <p>Drop song suggestions, vibes, or feedback while I stream 🎧</p>

    <textarea id="input" placeholder="Suggest a song, vibe, or share feedback..."></textarea>
    <button onclick="addSuggestion()">Send Suggestion</button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function addSuggestion() {
      const input = document.getElementById('input');
      const text = input.value.trim();

      if (!text) return;

      db.collection('suggestions').add({
        text: text,
        timestamp: Date.now()
      });

      input.value = "";
    }

    // Spark effect following mouse
    const sparkEmojis = ['✨', '⭐', '🌟', '💫'];
    let lastSparkTime = 0;

    document.addEventListener('mousemove', (e) => {
      const now = Date.now();
      if (now - lastSparkTime < 50) return; // Throttle spark creation
      lastSparkTime = now;

      const spark = document.createElement('div');
      spark.className = 'spark';
      spark.textContent = sparkEmojis[Math.floor(Math.random() * sparkEmojis.length)];
      
      const x = e.clientX;
      const y = e.clientY;
      
      spark.style.left = x + 'px';
      spark.style.top = y + 'px';
      
      // Random direction for spark dispersion
      const angle = Math.random() * Math.PI * 2;
      const distance = 30 + Math.random() * 30;
      const tx = Math.cos(angle) * distance;
      const ty = Math.sin(angle) * distance;
      
      spark.style.setProperty('--tx', tx + 'px');
      spark.style.setProperty('--ty', ty + 'px');
      
      document.body.appendChild(spark);
      
      // Remove spark after animation
      setTimeout(() => spark.remove(), 1000);
    });
  </script>

</body>
</html>
